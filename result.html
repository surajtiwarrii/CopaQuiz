<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Quiz Result — COPA</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Noto+Sans+Devanagari:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #F2EEFF;
    --accent: #9B7EDE;
    --accent2: #C084FC;
    --accent3: #818CF8;
    --grad: linear-gradient(120deg, #A78BFA, #C084FC, #818CF8);
    --glass: rgba(255,255,255,0.55);
    --glass-border: rgba(155,126,222,0.22);
    --glass-shadow: 0 8px 32px rgba(139,92,246,0.13);
    --text: #2D1B69;
    --text-muted: #6B5FA6;
    --green: #22c55e;
    --green-bg: rgba(34,197,94,0.12);
    --red: #ef4444;
    --red-bg: rgba(239,68,68,0.12);
    --amber: #f59e0b;
    --amber-bg: rgba(245,158,11,0.12);
    --radius: 20px;
    --radius-sm: 12px;
    --font-en: 'Poppins', sans-serif;
    --font-hi: 'Noto Sans Devanagari', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-en);
    background: #F2EEFF;
    background-image:
      radial-gradient(ellipse 60% 50% at 10% 10%, rgba(167,139,250,0.45) 0%, transparent 70%),
      radial-gradient(ellipse 50% 55% at 90% 90%, rgba(129,140,248,0.38) 0%, transparent 70%),
      radial-gradient(ellipse 40% 40% at 60% 40%, rgba(192,132,252,0.25) 0%, transparent 60%);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }
  body.lang-hi { font-family: var(--font-hi); }

  /* ── MESH BACKGROUND ── */
  .mesh-bg {
    position: absolute; inset: 0; z-index: 0; pointer-events: none;
    overflow: hidden; min-height: 100vh;
  }
  .mesh-bg::before, .mesh-bg::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.5;
    animation: meshFloat 10s ease-in-out infinite alternate;
  }
  .mesh-bg::before {
    width: 520px; height: 520px;
    background: radial-gradient(circle, #A78BFA 0%, #C084FC 60%, transparent 100%);
    top: -120px; left: -100px;
    animation-duration: 12s;
  }
  .mesh-bg::after {
    width: 420px; height: 420px;
    background: radial-gradient(circle, #818CF8 0%, #A78BFA 60%, transparent 100%);
    bottom: -80px; right: -60px;
    animation-duration: 9s; animation-direction: alternate-reverse;
  }
  .mesh-dot {
    position: absolute; border-radius: 50%; filter: blur(60px); opacity: 0.3;
    animation: meshFloat 14s ease-in-out infinite alternate;
  }
  .mesh-dot:nth-child(1) { width:300px;height:300px;background:#C084FC;top:40%;left:60%;animation-duration:11s; }
  .mesh-dot:nth-child(2) { width:200px;height:200px;background:#818CF8;top:25%;left:30%;animation-duration:15s; }
  @keyframes meshFloat {
    0%   { transform: translate(0,0) scale(1); }
    100% { transform: translate(30px,40px) scale(1.08); }
  }

  /* ── WRAPPER ── */
  .page { position: relative; z-index: 1; max-width: 840px; margin: 0 auto; padding: 24px 16px 60px; }

  /* ── LANG TOGGLE ── */
  .lang-toggle-wrap { display: flex; justify-content: flex-end; margin-bottom: 16px; }
  .lang-pill {
    display: flex; background: rgba(255,255,255,0.6);
    border: 1.5px solid var(--glass-border); border-radius: 999px;
    padding: 4px; gap: 2px; backdrop-filter: blur(12px);
    box-shadow: 0 2px 12px rgba(139,92,246,0.1);
  }
  .lang-btn {
    cursor: pointer; border: none; background: transparent;
    padding: 6px 18px; border-radius: 999px; font-size: 13px; font-weight: 600;
    color: var(--text-muted); transition: all 0.22s;
    font-family: var(--font-en);
  }
  .lang-btn.active {
    background: var(--grad); color: #fff;
    box-shadow: 0 2px 10px rgba(139,92,246,0.35);
  }

  /* ── GLASS CARD ── */
  .card {
    background: var(--glass);
    border: 1.5px solid var(--glass-border);
    border-radius: var(--radius);
    box-shadow: var(--glass-shadow);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    padding: 28px;
  }

  /* ── HERO SCORE ── */
  .hero-card {
    text-align: center;
    padding: 40px 28px 32px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }
  .hero-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 5px;
    background: var(--grad); border-radius: var(--radius) var(--radius) 0 0;
  }
  .chapter-label {
    font-size: 12px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--text-muted);
    margin-bottom: 8px;
    font-family: var(--font-mono);
  }
  .chapter-name {
    font-size: 20px; font-weight: 700; color: var(--text);
    margin-bottom: 28px; line-height: 1.3;
  }

  /* Score ring */
  .score-ring-wrap { position: relative; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 20px; }
  .score-ring-svg { transform: rotate(-90deg); }
  .score-ring-bg { fill: none; stroke: rgba(155,126,222,0.15); }
  .score-ring-fill { fill: none; stroke-linecap: round; transition: stroke-dashoffset 1.4s cubic-bezier(.4,0,.2,1); }
  .score-inner {
    position: absolute; text-align: center;
    display: flex; flex-direction: column; align-items: center;
  }
  .score-pct {
    font-size: 52px; font-weight: 900; line-height: 1;
    background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; font-family: var(--font-mono);
  }
  .score-label { font-size: 12px; color: var(--text-muted); font-weight: 500; margin-top: 2px; }

  /* ── PREMIUM GRADE BADGE ── */
  .grade-badge {
    display: inline-flex; align-items: center; gap: 14px;
    padding: 14px 24px 14px 14px; border-radius: 20px;
    background: var(--grad);
    color: #fff; font-size: 18px; font-weight: 800;
    box-shadow: 0 8px 32px rgba(139,92,246,0.45), inset 0 1px 0 rgba(255,255,255,0.3);
    margin-bottom: 10px; position: relative; overflow: hidden;
    letter-spacing: -0.3px;
  }
  .grade-badge::before {
    content: '';
    position: absolute; top: 0; left: -70%; width: 55%; height: 100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.28), transparent);
    transform: skewX(-18deg);
    animation: badgeSheen 3s ease-in-out infinite;
  }
  @keyframes badgeSheen {
    0%   { left: -70%; }
    40%  { left: 130%; }
    100% { left: 130%; }
  }
  .grade-icon-wrap {
    width: 40px; height: 40px; border-radius: 13px;
    background: rgba(255,255,255,0.22);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
    border: 1px solid rgba(255,255,255,0.3);
  }
  .grade-text-wrap { display: flex; flex-direction: column; align-items: flex-start; gap: 1px; }
  .grade-sublabel { font-size: 10px; font-weight: 600; opacity: 0.75; letter-spacing: 0.08em; text-transform: uppercase; font-family: var(--font-mono); }
  .grade-main { font-size: 19px; font-weight: 800; line-height: 1.1; }

  .score-fraction {
    font-size: 15px; color: var(--text-muted); font-family: var(--font-mono); font-weight: 600;
  }

  /* ── PREMIUM STATS GRID ── */
  .stats-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px;
    margin-bottom: 20px;
  }
  @media (min-width: 500px) { .stats-grid { grid-template-columns: repeat(4, 1fr); } }
  .stat-card {
    border-radius: 18px;
    padding: 20px 14px 16px; text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    position: relative; overflow: hidden;
    transition: transform 0.2s;
  }
  .stat-card:hover { transform: translateY(-3px); }
  .stat-card::before {
    content: ''; position: absolute; inset: 0; border-radius: 18px;
    opacity: 0.06; pointer-events: none;
  }
  .stat-card.green { background: linear-gradient(145deg, rgba(34,197,94,0.13), rgba(34,197,94,0.06)); border: 1.5px solid rgba(34,197,94,0.28); }
  .stat-card.red   { background: linear-gradient(145deg, rgba(239,68,68,0.13), rgba(239,68,68,0.06));  border: 1.5px solid rgba(239,68,68,0.28); }
  .stat-card.amber { background: linear-gradient(145deg, rgba(245,158,11,0.13), rgba(245,158,11,0.06)); border: 1.5px solid rgba(245,158,11,0.28); }
  .stat-card.blue  { background: linear-gradient(145deg, rgba(129,140,248,0.13), rgba(129,140,248,0.06)); border: 1.5px solid rgba(129,140,248,0.28); }

  /* SVG icon ring */
  .stat-icon-ring {
    width: 52px; height: 52px; border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .stat-card.green .stat-icon-ring { background: linear-gradient(135deg, rgba(34,197,94,0.22), rgba(74,222,128,0.15)); box-shadow: 0 4px 16px rgba(34,197,94,0.25); }
  .stat-card.red   .stat-icon-ring { background: linear-gradient(135deg, rgba(239,68,68,0.22), rgba(252,165,165,0.15)); box-shadow: 0 4px 16px rgba(239,68,68,0.25); }
  .stat-card.amber .stat-icon-ring { background: linear-gradient(135deg, rgba(245,158,11,0.22), rgba(253,211,77,0.15)); box-shadow: 0 4px 16px rgba(245,158,11,0.25); }
  .stat-card.blue  .stat-icon-ring { background: linear-gradient(135deg, rgba(129,140,248,0.22), rgba(167,139,250,0.15)); box-shadow: 0 4px 16px rgba(129,140,248,0.25); }
  .stat-icon-svg { width: 26px; height: 26px; }

  .stat-val { font-size: 28px; font-weight: 900; font-family: var(--font-mono); line-height: 1; letter-spacing: -1px; }
  .stat-card.green .stat-val { color: #16a34a; }
  .stat-card.red   .stat-val { color: #dc2626; }
  .stat-card.amber .stat-val { color: #d97706; }
  .stat-card.blue  .stat-val { color: #6366f1; }
  .stat-lbl { font-size: 10.5px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; }

  /* ── PREMIUM ACTION BUTTONS ── */
  .actions { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 28px; }
  .btn {
    flex: 1; min-width: 130px; cursor: pointer; border: none;
    padding: 15px 20px; border-radius: 16px;
    font-size: 14px; font-weight: 700; transition: all 0.25s cubic-bezier(.2,.9,.3,1.1);
    font-family: inherit; display: inline-flex; align-items: center; justify-content: center; gap: 10px;
    position: relative; overflow: hidden;
  }
  .btn::before {
    content: ''; position: absolute; top: 0; left: -60%; width: 50%; height: 100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.22), transparent);
    transform: skewX(-20deg); transition: left 0.5s;
  }
  .btn:hover::before { left: 130%; }
  .btn:hover { transform: translateY(-3px); }
  .btn:active { transform: translateY(0) scale(0.97); }

  /* Next Set button — primary gradient */
  .btn-primary {
    background: var(--grad); color: #fff;
    box-shadow: 0 6px 22px rgba(139,92,246,0.4), inset 0 1px 0 rgba(255,255,255,0.25);
  }
  .btn-primary:hover { box-shadow: 0 10px 32px rgba(139,92,246,0.55), inset 0 1px 0 rgba(255,255,255,0.25); }

  .btn-icon-box {
    width: 32px; height: 32px; border-radius: 10px;
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.3);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .btn-icon-box svg { width: 17px; height: 17px; }
  .btn-text-wrap { display: flex; flex-direction: column; align-items: flex-start; gap: 1px; }
  .btn-sub { font-size: 9.5px; font-weight: 600; opacity: 0.75; letter-spacing: 0.07em; text-transform: uppercase; font-family: var(--font-mono); }
  .btn-main { font-size: 14px; font-weight: 800; line-height: 1; }

  /* Home button — glass outline */
  .btn-outline {
    background: rgba(255,255,255,0.72); color: var(--text);
    border: 1.5px solid var(--glass-border); backdrop-filter: blur(12px);
    box-shadow: 0 4px 16px rgba(139,92,246,0.1), inset 0 1px 0 rgba(255,255,255,0.9);
  }
  .btn-outline .btn-icon-box { background: rgba(155,126,222,0.12); border-color: rgba(155,126,222,0.2); }
  .btn-outline .btn-main { color: var(--text); }
  .btn-outline .btn-sub { color: var(--text-muted); }
  .btn-outline:hover { background: rgba(255,255,255,0.92); box-shadow: 0 8px 24px rgba(139,92,246,0.18), inset 0 1px 0 rgba(255,255,255,0.9); }

  /* ── REVIEW SECTION ── */
  .review-header {
    font-size: 18px; font-weight: 700; color: var(--text);
    margin-bottom: 16px; display: flex; align-items: center; gap: 10px;
  }
  .review-header span.pill {
    font-size: 12px; font-weight: 600; font-family: var(--font-mono);
    background: rgba(155,126,222,0.15); color: var(--accent);
    padding: 3px 10px; border-radius: 999px;
  }

  /* ── FILTER TABS ── */
  .filter-tabs {
    display: flex; gap: 8px; margin-bottom: 18px;
    background: rgba(255,255,255,0.4); padding: 5px; border-radius: 16px;
    backdrop-filter: blur(12px); border: 1.5px solid var(--glass-border);
  }
  .filter-tab {
    flex: 1; padding: 11px 8px; border: none; cursor: pointer;
    border-radius: 12px; font-family: inherit; font-weight: 700; font-size: 13px;
    background: transparent; color: var(--text-muted); transition: all 0.25s;
    display: flex; align-items: center; justify-content: center; gap: 5px;
  }
  .filter-tab .cnt {
    font-size: 11px; font-weight: 700; padding: 1px 7px; border-radius: 999px;
    background: rgba(0,0,0,0.06);
  }
  .filter-tab.active.all { background: var(--accent); color: #fff; box-shadow: 0 4px 12px rgba(155,126,222,0.4); }
  .filter-tab.active.correct { background: var(--green); color: #fff; box-shadow: 0 4px 12px rgba(34,197,94,0.4); }
  .filter-tab.active.wrong { background: var(--red); color: #fff; box-shadow: 0 4px 12px rgba(239,68,68,0.4); }
  .filter-tab.active .cnt { background: rgba(255,255,255,0.28); color: #fff; }
  .q-card.hidden { display: none; }

  .q-card {
    margin-bottom: 16px; padding: 22px 22px 18px;
    border-radius: var(--radius);
  }
  .q-num {
    font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--text-muted);
    font-family: var(--font-mono); margin-bottom: 8px;
    display: flex; align-items: center; gap: 8px;
  }
  .q-status-badge {
    padding: 2px 9px; border-radius: 999px; font-size: 11px; font-weight: 700;
  }
  .q-status-badge.correct { background: var(--green-bg); color: var(--green); }
  .q-status-badge.wrong   { background: var(--red-bg);   color: var(--red); }
  .q-status-badge.skipped { background: var(--amber-bg); color: var(--amber); }

  .q-text { font-size: 15px; font-weight: 600; line-height: 1.55; margin-bottom: 14px; color: var(--text); }

  .opts-grid { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
  .opt {
    padding: 10px 14px; border-radius: var(--radius-sm); font-size: 13.5px; font-weight: 500;
    display: flex; align-items: flex-start; gap: 10px;
    background: rgba(255,255,255,0.45); border: 1.5px solid rgba(155,126,222,0.14);
    transition: background 0.18s;
  }
  .opt.correct { background: var(--green-bg); border-color: rgba(34,197,94,0.35); color: #166534; }
  .opt.wrong   { background: var(--red-bg);   border-color: rgba(239,68,68,0.35);  color: #991b1b; }
  .opt-letter {
    font-family: var(--font-mono); font-size: 12px; font-weight: 700;
    min-width: 22px; height: 22px; border-radius: 6px; display: flex; align-items: center; justify-content: center;
    background: rgba(155,126,222,0.15); color: var(--accent); flex-shrink: 0; margin-top: 1px;
  }
  .opt.correct .opt-letter { background: rgba(34,197,94,0.2);  color: #166534; }
  .opt.wrong   .opt-letter { background: rgba(239,68,68,0.2);   color: #991b1b; }
  .opt-icon { font-size: 14px; flex-shrink: 0; margin-top: 2px; }

  .exp-box {
    background: rgba(167,139,250,0.1); border: 1.5px solid rgba(167,139,250,0.25);
    border-radius: var(--radius-sm); padding: 12px 14px;
    font-size: 13px; line-height: 1.6; color: var(--text-muted);
    display: flex; gap: 9px;
  }
  .exp-icon { font-size: 15px; flex-shrink: 0; margin-top: 1px; }

  /* ── FOOTER META ── */
  .meta-row {
    display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 24px;
    font-size: 12px; font-family: var(--font-mono); color: var(--text-muted);
  }
  .meta-chip {
    background: rgba(255,255,255,0.6); border: 1.5px solid var(--glass-border);
    padding: 4px 12px; border-radius: 999px; backdrop-filter: blur(8px);
  }

  /* Divider */
  .divider { height: 1px; background: var(--glass-border); margin: 20px 0; }

  /* Stagger reveal */
  .q-card { opacity: 0; transform: translateY(18px); transition: opacity 0.4s, transform 0.4s; }
  .q-card.visible { opacity: 1; transform: none; }

  @media (max-width: 480px) {
    .score-pct { font-size: 40px; }
    .card { padding: 18px; }
    .hero-card { padding: 28px 18px 24px; }
  }

  /* ══════════════════════════════════════════
     PREMIUM EMPTY STATE — Score-Adaptive
  ══════════════════════════════════════════ */
  .empty-state {
    text-align: center; padding: 52px 20px 44px; color: var(--text-muted);
  }
  .empty-state h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; color: var(--text); }
  .empty-state p  { font-size: 15px; line-height: 1.6; }

  /* ── ANIMATION STAGE ── */
  .anim-stage {
    position: relative;
    width: 160px; height: 160px;
    margin: 0 auto 28px;
    display: flex; align-items: center; justify-content: center;
  }

  /* ── PULSE RINGS (background) ── */
  .pulse-ring {
    position: absolute;
    border-radius: 50%;
    border: 2px solid var(--accent2);
    opacity: 0;
    animation: pulseRing 2.4s ease-out infinite;
  }
  .pulse-ring:nth-child(2) { animation-delay: 0.6s; }
  .pulse-ring:nth-child(3) { animation-delay: 1.2s; }
  @keyframes pulseRing {
    0%   { width: 60px; height: 60px; opacity: 0.7; }
    100% { width: 160px; height: 160px; opacity: 0; }
  }

  /* ── GLASS ORBS (orbiting) ── */
  .orbit-wrap {
    position: absolute;
    width: 130px; height: 130px;
    border-radius: 50%;
    animation: orbitSpin 6s linear infinite;
  }
  .orbit-wrap.rev { animation-direction: reverse; animation-duration: 9s; }
  @keyframes orbitSpin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  .orb {
    position: absolute;
    border-radius: 50%;
    backdrop-filter: blur(6px);
    border: 1.5px solid rgba(255,255,255,0.6);
  }
  .orb-a {
    width: 18px; height: 18px;
    background: linear-gradient(135deg, #A78BFA, #C084FC);
    top: -9px; left: 50%; transform: translateX(-50%);
    box-shadow: 0 0 12px rgba(167,139,250,0.7);
  }
  .orb-b {
    width: 12px; height: 12px;
    background: linear-gradient(135deg, #818CF8, #A78BFA);
    bottom: -6px; left: 50%; transform: translateX(-50%);
    box-shadow: 0 0 8px rgba(129,140,248,0.6);
  }
  .orb-c {
    width: 10px; height: 10px;
    background: linear-gradient(135deg, #C084FC, #F0ABFC);
    top: 50%; right: -5px; transform: translateY(-50%);
    box-shadow: 0 0 8px rgba(192,132,252,0.6);
  }

  /* ── CENTER ICON GLASS CARD ── */
  .center-icon-wrap {
    position: relative; z-index: 2;
    width: 96px; height: 96px;
    border-radius: 32px;
    background: rgba(255,255,255,0.72);
    border: 1.5px solid rgba(167,139,250,0.35);
    box-shadow:
      0 8px 32px rgba(139,92,246,0.22),
      0 2px 8px rgba(167,139,250,0.15),
      inset 0 1px 0 rgba(255,255,255,0.9);
    backdrop-filter: blur(20px);
    display: flex; align-items: center; justify-content: center;
    font-size: 44px;
    animation: iconFloat 3.8s ease-in-out infinite;
  }
  @keyframes iconFloat {
    0%,100% { transform: translateY(0) scale(1); box-shadow: 0 8px 32px rgba(139,92,246,0.22), 0 2px 8px rgba(167,139,250,0.15), inset 0 1px 0 rgba(255,255,255,0.9); }
    50%      { transform: translateY(-10px) scale(1.04); box-shadow: 0 22px 48px rgba(139,92,246,0.32), 0 6px 16px rgba(167,139,250,0.2), inset 0 1px 0 rgba(255,255,255,0.9); }
  }

  /* ── SCORE-BASED VARIANTS ── */
  /* Outstanding (≥90) — gold shimmer */
  .anim-stage.outstanding .center-icon-wrap {
    background: linear-gradient(135deg, rgba(255,247,205,0.9), rgba(255,255,255,0.8));
    border-color: rgba(245,158,11,0.4);
    box-shadow: 0 8px 32px rgba(245,158,11,0.28), 0 2px 8px rgba(251,191,36,0.2), inset 0 1px 0 rgba(255,255,255,0.95);
    animation: iconFloatGold 3.8s ease-in-out infinite, shimmerGold 2.2s ease-in-out infinite alternate;
  }
  .anim-stage.outstanding .pulse-ring { border-color: #F59E0B; }
  .anim-stage.outstanding .orb-a { background: linear-gradient(135deg,#FCD34D,#F59E0B); box-shadow: 0 0 12px rgba(245,158,11,0.8); }
  .anim-stage.outstanding .orb-b { background: linear-gradient(135deg,#FDE68A,#FBBF24); box-shadow: 0 0 8px rgba(251,191,36,0.6); }
  .anim-stage.outstanding .orb-c { background: linear-gradient(135deg,#F59E0B,#D97706); box-shadow: 0 0 8px rgba(217,119,6,0.6); }
  @keyframes shimmerGold {
    0%   { box-shadow: 0 8px 32px rgba(245,158,11,0.28), 0 2px 8px rgba(251,191,36,0.2), inset 0 1px 0 rgba(255,255,255,0.95); }
    100% { box-shadow: 0 8px 42px rgba(245,158,11,0.55), 0 2px 18px rgba(251,191,36,0.4), inset 0 1px 0 rgba(255,255,255,0.95); }
  }
  @keyframes iconFloatGold {
    0%,100% { transform: translateY(0) scale(1) rotate(-2deg); }
    50%      { transform: translateY(-10px) scale(1.06) rotate(2deg); }
  }

  /* Good (≥60) — green glow */
  .anim-stage.good .center-icon-wrap {
    border-color: rgba(34,197,94,0.35);
    box-shadow: 0 8px 32px rgba(34,197,94,0.2), 0 2px 8px rgba(34,197,94,0.15), inset 0 1px 0 rgba(255,255,255,0.9);
  }
  .anim-stage.good .pulse-ring { border-color: #22c55e; }
  .anim-stage.good .orb-a { background: linear-gradient(135deg,#4ADE80,#22c55e); box-shadow: 0 0 12px rgba(34,197,94,0.7); }
  .anim-stage.good .orb-b { background: linear-gradient(135deg,#86EFAC,#4ADE80); box-shadow: 0 0 8px rgba(74,222,128,0.6); }
  .anim-stage.good .orb-c { background: linear-gradient(135deg,#22c55e,#16a34a); box-shadow: 0 0 8px rgba(22,163,74,0.6); }

  /* Low (<40) — motivational red/orange pulse */
  .anim-stage.low .center-icon-wrap {
    border-color: rgba(239,68,68,0.3);
    box-shadow: 0 8px 32px rgba(239,68,68,0.18), 0 2px 8px rgba(239,68,68,0.12), inset 0 1px 0 rgba(255,255,255,0.9);
    animation: iconPulseMotivate 1.8s ease-in-out infinite;
  }
  .anim-stage.low .pulse-ring { border-color: #f97316; animation-duration: 1.8s; }
  .anim-stage.low .orb-a { background: linear-gradient(135deg,#FB923C,#F97316); box-shadow: 0 0 12px rgba(249,115,22,0.7); }
  .anim-stage.low .orb-b { background: linear-gradient(135deg,#FCA5A5,#EF4444); box-shadow: 0 0 8px rgba(239,68,68,0.6); }
  .anim-stage.low .orb-c { background: linear-gradient(135deg,#F97316,#EA580C); box-shadow: 0 0 8px rgba(234,88,12,0.6); }
  @keyframes iconPulseMotivate {
    0%,100% { transform: scale(1); }
    30%     { transform: scale(1.08); }
    60%     { transform: scale(0.96); }
  }

  /* ── CONFETTI PARTICLES (for ≥75%) ── */
  .confetti-wrap {
    position: absolute; inset: 0; pointer-events: none; overflow: visible;
  }
  .conf-dot {
    position: absolute;
    width: 7px; height: 7px;
    border-radius: 2px;
    opacity: 0;
    animation: confFly var(--dur,2.4s) ease-out var(--delay,0s) infinite;
    left: 50%; top: 50%;
    transform-origin: center;
  }
  @keyframes confFly {
    0%   { transform: translate(-50%,-50%) rotate(0deg) scale(1); opacity: 1; }
    80%  { opacity: 0.6; }
    100% { transform: translate(calc(-50% + var(--tx,40px)), calc(-50% + var(--ty,-80px))) rotate(var(--rot,360deg)) scale(0.4); opacity: 0; }
  }

  /* ── SPARKLE STARS (for ≥60%) ── */
  .sparkle {
    position: absolute;
    pointer-events: none;
    animation: sparklePop var(--sdur,1.8s) ease-in-out var(--sdelay,0s) infinite;
    font-size: var(--ssize,14px);
    opacity: 0;
  }
  @keyframes sparklePop {
    0%,100% { opacity: 0; transform: scale(0.3) rotate(0deg); }
    40%     { opacity: 1; transform: scale(1.2) rotate(20deg); }
    70%     { opacity: 0.6; transform: scale(0.9) rotate(-10deg); }
  }
</style>
</head>
<body>
<div style="position:relative; min-height:100vh; overflow:hidden;">
<div class="mesh-bg">
  <div class="mesh-dot"></div>
  <div class="mesh-dot"></div>
</div>

<div class="page">
  <div class="lang-toggle-wrap">
    <div class="lang-pill">
      <button class="lang-btn active" id="btnEn" onclick="setLang('en')">English</button>
      <button class="lang-btn" id="btnHi" onclick="setLang('hi')">हिन्दी</button>
    </div>
  </div>

  <div id="root"></div>
</div>

<script>
// ── LOAD RESULT FROM localStorage (saved by quiz page as 'copa_result') ──
let DATA = null;
let LANG = 'en';

(function loadResult() {
  try {
    const raw = localStorage.getItem('copa_result');
    if (!raw) return;
    const r = JSON.parse(raw);

    // Save lang preference
    if (r.lang) LANG = r.lang;

    // Map copa_result format → result page format
    const correctCount = r.score || 0;
    const answeredCount = (r.answered != null) ? r.answered : (r.total - (r.skipped || 0) - (r.left || 0));
    const wrongCount = answeredCount - correctCount;

    DATA = {
      chapterName : r.chapterEn || r.chapterHi || 'Quiz Result',
      subject     : r.subject || '',
      mode        : r.mode    || '',
      total       : r.total   || 0,
      correct     : correctCount,
      wrong       : Math.max(0, wrongCount),
      skipped     : r.skipped || 0,
      timeTaken   : r.timeUsed || 0,
      questions   : r.review  || []
    };
  } catch(e) {
    console.warn('copa_result parse error:', e);
  }
})();

function setLang(l) {
  LANG = l;
  document.getElementById('btnEn').classList.toggle('active', l === 'en');
  document.getElementById('btnHi').classList.toggle('active', l === 'hi');
  document.body.classList.toggle('lang-hi', l === 'hi');
  render();
}

function t(en, hi) { return LANG === 'hi' ? hi : en; }

// ── GRADE ──
function getGrade(pct) {
  if (pct >= 90) return { label: t('Outstanding','शानदार'), emoji: '🏆', color: '#7C3AED' };
  if (pct >= 75) return { label: t('Excellent','उत्कृष्ट'),  emoji: '🎉', color: '#6D28D9' };
  if (pct >= 60) return { label: t('Good','अच्छा'),          emoji: '👍', color: '#2563EB' };
  if (pct >= 40) return { label: t('Average','औसत'),         emoji: '📚', color: '#D97706' };
  return             { label: t('Keep Trying','प्रयास जारी रखें'), emoji: '💪', color: '#DC2626' };
}

// ── TIME FORMAT ──
function fmtTime(sec) {
  if (!sec && sec !== 0) return '--';
  const m = Math.floor(sec / 60), s = sec % 60;
  return `${m}:${s.toString().padStart(2,'0')}`;
}

// ── REDIRECT URLS ──
function subjectUrl(d, type) {
  const s = (d.subject || '').toLowerCase();
  const isTheory = s.includes('theory') || s.includes('copa');
  const isEmp    = s.includes('employ');
  const home     = 'index.html';
  const theory   = 'copa.html';
  const emp      = 'employability.html';
  if (s.includes('full') || d.mode === 'full') return home;
  if (type === 'home')  return home;
  if (type === 'new')   return isEmp ? emp : isTheory ? theory : home;
  return 'quiz.html';
}

// ── ANIMATED COUNT-UP ──
let countUpAnim = null;
function startCountUp(target, duration, callback) {
  if (countUpAnim) cancelAnimationFrame(countUpAnim);
  const start = performance.now();
  function step(now) {
    const elapsed = Math.min((now - start) / duration, 1);
    const ease = 1 - Math.pow(1 - elapsed, 3);
    const val = Math.round(ease * target);
    callback(val);
    if (elapsed < 1) countUpAnim = requestAnimationFrame(step);
  }
  countUpAnim = requestAnimationFrame(step);
}

// ── RING ──
function ringHTML(pct) {
  const R = 70, C = 2 * Math.PI * R;
  return `
  <div class="score-ring-wrap">
    <svg class="score-ring-svg" width="170" height="170" viewBox="0 0 170 170">
      <defs>
        <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#A78BFA"/>
          <stop offset="50%" stop-color="#C084FC"/>
          <stop offset="100%" stop-color="#818CF8"/>
        </linearGradient>
      </defs>
      <circle class="score-ring-bg" cx="85" cy="85" r="${R}" stroke-width="12"/>
      <circle class="score-ring-fill" id="ringFill"
        cx="85" cy="85" r="${R}" stroke-width="12"
        stroke="url(#ringGrad)"
        stroke-dasharray="${C}"
        stroke-dashoffset="${C}"/>
    </svg>
    <div class="score-inner">
      <div class="score-pct" id="scorePct">0%</div>
      <div class="score-label">${t('Score','स्कोर')}</div>
    </div>
  </div>`;
}

// ── OPT LETTER ──
function optLetter(i) { return String.fromCharCode(65 + i); }

// ── QUESTION CARD HTML ──
function qCardHTML(q, idx) {
  const isSkip = q.chosen === -1 || q.chosen === undefined;
  const statusClass = isSkip ? 'skipped' : q.ok ? 'correct' : 'wrong';
  const statusLabel = isSkip
    ? t('Skipped','छोड़ा')
    : q.ok ? t('Correct','सही') : t('Wrong','गलत');

  const qText  = t(q.qEn  || '', q.qHi  || q.qEn  || '');
  const opts   = t(q.optsEn || [], q.optsHi || q.optsEn || []);
  const correctIdx = (LANG === 'hi') ? q.ansHi : q.ansEn;
  const expTxt = t(q.expEn || '', q.expHi || q.expEn || '');

  const optsHTML = opts.map((opt, i) => {
    let cls = '';
    if (i === correctIdx) cls = 'correct';
    else if (i === q.chosen && !q.ok) cls = 'wrong';
    const icon = i === correctIdx ? '✓' : (i === q.chosen && !q.ok ? '✗' : '');
    return `<div class="opt ${cls}">
      <span class="opt-letter">${optLetter(i)}</span>
      <span style="flex:1">${opt}</span>
      ${icon ? `<span class="opt-icon">${icon}</span>` : ''}
    </div>`;
  }).join('');

  const expBlock = expTxt ? `
    <div class="exp-box">
      <span class="exp-icon">💡</span>
      <span>${expTxt}</span>
    </div>` : '';

  return `
  <div class="q-card card" id="qcard-${idx}" data-status="${q.ok ? 'correct' : 'wrong'}">
    <div class="q-num">
      Q${idx + 1}
      <span class="q-status-badge ${statusClass}">${statusLabel}</span>
    </div>
    <div class="q-text">${qText}</div>
    <div class="opts-grid">${optsHTML}</div>
    ${expBlock}
  </div>`;
}

// ══════════════════════════════════════════
// PREMIUM EMPTY STATE — Score-Adaptive HTML
// ══════════════════════════════════════════
function premiumEmptyStateHTML(score) {
  // score = 0–100 for demo; undefined = no data
  const pct = (score !== undefined && score !== null) ? score : 50;

  // Determine variant
  let variant, icon, confettiColors, showConfetti, showSparkles;
  if (pct >= 90) {
    variant = 'outstanding';
    icon = '🏆';
    confettiColors = ['#FCD34D','#F59E0B','#A78BFA','#C084FC','#FDE68A','#FBBF24'];
    showConfetti = true; showSparkles = true;
  } else if (pct >= 75) {
    variant = 'excellent';
    icon = '🎉';
    confettiColors = ['#A78BFA','#C084FC','#818CF8','#F0ABFC','#67E8F9','#6EE7B7'];
    showConfetti = true; showSparkles = true;
  } else if (pct >= 60) {
    variant = 'good';
    icon = '👍';
    confettiColors = [];
    showConfetti = false; showSparkles = true;
  } else if (pct >= 40) {
    variant = '';
    icon = '📚';
    confettiColors = [];
    showConfetti = false; showSparkles = false;
  } else {
    variant = 'low';
    icon = '💪';
    confettiColors = [];
    showConfetti = false; showSparkles = false;
  }

  // Confetti dots HTML
  let confettiHTML = '';
  if (showConfetti) {
    const count = pct >= 90 ? 18 : 12;
    for (let i = 0; i < count; i++) {
      const angle = (i / count) * 360;
      const rad = angle * Math.PI / 180;
      const dist = 55 + Math.random() * 45;
      const tx = Math.round(Math.cos(rad) * dist);
      const ty = Math.round(Math.sin(rad) * dist) - 30;
      const color = confettiColors[i % confettiColors.length];
      const dur = (2.0 + Math.random() * 1.2).toFixed(2);
      const delay = (Math.random() * 1.6).toFixed(2);
      const rot = Math.random() > 0.5 ? 360 : -360;
      confettiHTML += `<div class="conf-dot" style="background:${color};--tx:${tx}px;--ty:${ty}px;--dur:${dur}s;--delay:${delay}s;--rot:${rot}deg;border-radius:${Math.random()>0.5?'50%':'3px'}"></div>`;
    }
  }

  // Sparkle stars HTML
  let sparkleHTML = '';
  if (showSparkles) {
    const stars = ['✦','✧','⋆','✦','✧'];
    const positions = [
      {top:'-18px',left:'10px'},{top:'5px',right:'-20px'},{bottom:'10px',right:'-12px'},
      {top:'-10px',right:'20px'},{bottom:'-12px',left:'20px'}
    ];
    stars.forEach((s, i) => {
      const pos = positions[i];
      const posStr = Object.entries(pos).map(([k,v])=>`${k}:${v}`).join(';');
      const dur = (1.4 + Math.random() * 1.2).toFixed(2);
      const delay = (i * 0.35).toFixed(2);
      const size = (12 + Math.random() * 8).toFixed(0);
      const colors = ['#C084FC','#A78BFA','#818CF8','#F59E0B','#22c55e'];
      sparkleHTML += `<span class="sparkle" style="${posStr};--sdur:${dur}s;--sdelay:${delay}s;--ssize:${size}px;color:${colors[i%colors.length]}">${s}</span>`;
    });
  }

  return `
  <div class="card empty-state">
    <div class="anim-stage ${variant}">
      <!-- Pulse rings -->
      <div class="pulse-ring"></div>
      <div class="pulse-ring"></div>
      <div class="pulse-ring"></div>

      <!-- Confetti -->
      <div class="confetti-wrap">${confettiHTML}</div>

      <!-- Orbiting glass orbs -->
      <div class="orbit-wrap">
        <div class="orb orb-a"></div>
        <div class="orb orb-b"></div>
      </div>
      <div class="orbit-wrap rev">
        <div class="orb orb-c"></div>
      </div>

      <!-- Center glass card -->
      <div class="center-icon-wrap">
        ${sparkleHTML}
        ${icon}
      </div>
    </div>

    <h2>${t('No Result Found','कोई परिणाम नहीं मिला')}</h2>
    <p>${t(
      'Complete a quiz first, then come back here to see your detailed results and review.',
      'पहले एक क्विज़ पूरा करें, फिर यहाँ आकर अपने विस्तृत परिणाम और समीक्षा देखें।'
    )}</p>
  </div>`;
}

// ── MAIN RENDER ──
function render() {
  const root = document.getElementById('root');

  if (!DATA) {
    // Demo: cycle score on each render for showcase
    const demoScore = window._demoScore !== undefined ? window._demoScore : 85;
    root.innerHTML = premiumEmptyStateHTML(demoScore);
    return;
  }

  // ── REAL RESULT RENDER ──
  const d = DATA;
  const total   = d.questions ? d.questions.length : (d.total || 0);
  const correct = d.correct ?? 0;
  const wrong   = d.wrong   ?? 0;
  const skipped = d.skipped ?? (total - correct - wrong);
  const pct     = total > 0 ? Math.round((correct / total) * 100) : 0;
  const grade   = getGrade(pct);

  const R = 70, C = 2 * Math.PI * R;

  root.innerHTML = `
  <div class="hero-card card" style="margin-bottom:20px">
    <div class="chapter-label">${t('COPA — Chapter Result','COPA — अध्याय परिणाम')}</div>
    <div class="chapter-name">${d.chapterName || d.chapter || t('Quiz Complete','क्विज़ समाप्त')}</div>
    ${ringHTML(pct)}
    <div>
      <div class="grade-badge">
        <div class="grade-icon-wrap">${grade.emoji}</div>
        <div class="grade-text-wrap">
          <div class="grade-sublabel">${t('Your Grade','ग्रेड')}</div>
          <div class="grade-main">${grade.label}</div>
        </div>
      </div>
    </div>
    <div class="score-fraction" style="margin-top:10px">${correct} / ${total} ${t('Correct','सही')}</div>
  </div>

  <div class="stats-grid">
    <div class="stat-card green">
      <div class="stat-icon-ring">
        <svg class="stat-icon-svg" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" fill="rgba(34,197,94,0.15)"/>
          <path d="M7 13l3.5 3.5L17 8" stroke="#16a34a" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="stat-val">${correct}</div>
      <div class="stat-lbl">${t('Correct','सही')}</div>
    </div>
    <div class="stat-card red">
      <div class="stat-icon-ring">
        <svg class="stat-icon-svg" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" fill="rgba(239,68,68,0.15)"/>
          <path d="M8 8l8 8M16 8l-8 8" stroke="#dc2626" stroke-width="2.2" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="stat-val">${wrong}</div>
      <div class="stat-lbl">${t('Wrong','गलत')}</div>
    </div>
    <div class="stat-card amber">
      <div class="stat-icon-ring">
        <svg class="stat-icon-svg" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" fill="rgba(245,158,11,0.15)"/>
          <path d="M12 7v5l3 3" stroke="#d97706" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M18.5 8.5l1.5-1.5M5.5 8.5L4 7" stroke="#d97706" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="stat-val">${skipped}</div>
      <div class="stat-lbl">${t('Skipped','छोड़े')}</div>
    </div>
    <div class="stat-card blue">
      <div class="stat-icon-ring">
        <svg class="stat-icon-svg" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" fill="rgba(129,140,248,0.15)"/>
          <circle cx="12" cy="12" r="4" stroke="#6366f1" stroke-width="2"/>
          <path d="M12 2v2M12 20v2M2 12h2M20 12h2" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="stat-val">${fmtTime(d.timeTaken)}</div>
      <div class="stat-lbl">${t('Time','समय')}</div>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-primary" onclick="location.href='${subjectUrl(d,'new')}'">
      <div class="btn-icon-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14M13 6l6 6-6 6"/>
          <rect x="2" y="6" width="5" height="12" rx="2" fill="rgba(255,255,255,0.25)" stroke="none"/>
        </svg>
      </div>
      <div class="btn-text-wrap">
        <div class="btn-sub">${t('Continue','जारी रखें')}</div>
        <div class="btn-main">${t('Next Set','अगला सेट')}</div>
      </div>
    </button>
    <button class="btn btn-outline" onclick="location.href='${subjectUrl(d,'home')}'">
      <div class="btn-icon-box">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12L12 4l9 8" stroke="#9B7EDE"/>
          <path d="M9 21V12h6v9" stroke="#9B7EDE"/>
          <path d="M5 10v11h14V10" stroke="#9B7EDE" stroke-width="1.5"/>
        </svg>
      </div>
      <div class="btn-text-wrap">
        <div class="btn-sub" style="color:var(--text-muted)">${t('Go to','वापस')}</div>
        <div class="btn-main">${t('Home','होम')}</div>
      </div>
    </button>
  </div>

  <div class="review-header">
    ${t('Question Review','प्रश्न समीक्षा')}
    <span class="pill">${total} ${t('Qs','प्रश्न')}</span>
  </div>

  <div class="filter-tabs">
    <button class="filter-tab all active" onclick="filterReview('all',this)">${t('All','सभी')} <span class="cnt">${total}</span></button>
    <button class="filter-tab correct" onclick="filterReview('correct',this)">✓ ${t('Correct','सही')} <span class="cnt">${d.correct||0}</span></button>
    <button class="filter-tab wrong" onclick="filterReview('wrong',this)">✗ ${t('Wrong','गलत')} <span class="cnt">${(d.wrong||0)+(d.skipped||0)}</span></button>
  </div>

  <div id="qlist">
    ${(d.questions || []).map((q, i) => qCardHTML(q, i)).join('')}
  </div>
  `;

  // Animate ring
  setTimeout(() => {
    const ring = document.getElementById('ringFill');
    if (ring) {
      const offset = C - (pct / 100) * C;
      ring.style.strokeDashoffset = offset;
    }
    startCountUp(pct, 1400, (val) => {
      const el = document.getElementById('scorePct');
      if (el) el.textContent = val + '%';
    });
  }, 80);

  // Stagger q-cards
  setTimeout(() => {
    document.querySelectorAll('.q-card').forEach((el, i) => {
      setTimeout(() => el.classList.add('visible'), i * 60);
    });
  }, 200);
}

// ══════════════════════════════════════════
// FILTER REVIEW — All / Correct / Wrong
// ══════════════════════════════════════════
function filterReview(mode, btn) {
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.q-card').forEach(card => {
    const status = card.getAttribute('data-status');
    let show = true;
    if (mode === 'correct') show = (status === 'correct');
    else if (mode === 'wrong') show = (status === 'wrong');
    card.classList.toggle('hidden', !show);
  });
}

render();

// Sync lang buttons with loaded preference
document.getElementById('btnEn').classList.toggle('active', LANG === 'en');
document.getElementById('btnHi').classList.toggle('active', LANG === 'hi');
document.body.classList.toggle('lang-hi', LANG === 'hi');

// ── DEMO: Click empty state to cycle through score variants ──
document.addEventListener('click', (e) => {
  if (DATA) return;
  const scores = [95, 80, 65, 45, 20];
  const cur = window._demoScore !== undefined ? window._demoScore : 85;
  const idx = scores.indexOf(cur);
  window._demoScore = scores[(idx + 1) % scores.length];
  render();
});window.addEventListener('pageshow', function(e){
  if(e.persisted){
    document.body.classList.remove('exit');
    document.body.style.opacity='1';
    document.body.style.transform='none';
  }
});
</script>
