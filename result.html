<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Quiz Result — COPA</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Noto+Sans+Devanagari:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #F2EEFF;
    --accent: #9B7EDE;
    --accent2: #C084FC;
    --accent3: #818CF8;
    --grad: linear-gradient(120deg, #A78BFA, #C084FC, #818CF8);
    --glass: rgba(255,255,255,0.55);
    --glass-border: rgba(155,126,222,0.22);
    --glass-shadow: 0 8px 32px rgba(139,92,246,0.13);
    --text: #2D1B69;
    --text-muted: #6B5FA6;
    --green: #22c55e;
    --green-bg: rgba(34,197,94,0.12);
    --red: #ef4444;
    --red-bg: rgba(239,68,68,0.12);
    --amber: #f59e0b;
    --amber-bg: rgba(245,158,11,0.12);
    --radius: 20px;
    --radius-sm: 12px;
    --font-en: 'Poppins', sans-serif;
    --font-hi: 'Noto Sans Devanagari', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-en);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }
  body.lang-hi { font-family: var(--font-hi); }

  /* ── MESH BACKGROUND ── */
  .mesh-bg {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    overflow: hidden;
  }
  .mesh-bg::before, .mesh-bg::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.38;
    animation: meshFloat 10s ease-in-out infinite alternate;
  }
  .mesh-bg::before {
    width: 520px; height: 520px;
    background: radial-gradient(circle, #A78BFA 0%, #C084FC 60%, transparent 100%);
    top: -120px; left: -100px;
    animation-duration: 12s;
  }
  .mesh-bg::after {
    width: 420px; height: 420px;
    background: radial-gradient(circle, #818CF8 0%, #A78BFA 60%, transparent 100%);
    bottom: -80px; right: -60px;
    animation-duration: 9s; animation-direction: alternate-reverse;
  }
  .mesh-dot {
    position: absolute; border-radius: 50%; filter: blur(60px); opacity: 0.22;
    animation: meshFloat 14s ease-in-out infinite alternate;
  }
  .mesh-dot:nth-child(1) { width:300px;height:300px;background:#C084FC;top:40%;left:60%;animation-duration:11s; }
  .mesh-dot:nth-child(2) { width:200px;height:200px;background:#818CF8;top:25%;left:30%;animation-duration:15s; }
  @keyframes meshFloat {
    0%   { transform: translate(0,0) scale(1); }
    100% { transform: translate(30px,40px) scale(1.08); }
  }

  /* ── WRAPPER ── */
  .page { position: relative; z-index: 1; max-width: 840px; margin: 0 auto; padding: 24px 16px 60px; }

  /* ── LANG TOGGLE ── */
  .lang-toggle-wrap { display: flex; justify-content: flex-end; margin-bottom: 16px; }
  .lang-pill {
    display: flex; background: rgba(255,255,255,0.6);
    border: 1.5px solid var(--glass-border); border-radius: 999px;
    padding: 4px; gap: 2px; backdrop-filter: blur(12px);
    box-shadow: 0 2px 12px rgba(139,92,246,0.1);
  }
  .lang-btn {
    cursor: pointer; border: none; background: transparent;
    padding: 6px 18px; border-radius: 999px; font-size: 13px; font-weight: 600;
    color: var(--text-muted); transition: all 0.22s;
    font-family: var(--font-en);
  }
  .lang-btn.active {
    background: var(--grad); color: #fff;
    box-shadow: 0 2px 10px rgba(139,92,246,0.35);
  }

  /* ── GLASS CARD ── */
  .card {
    background: var(--glass);
    border: 1.5px solid var(--glass-border);
    border-radius: var(--radius);
    box-shadow: var(--glass-shadow);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    padding: 28px;
  }

  /* ── HERO SCORE ── */
  .hero-card {
    text-align: center;
    padding: 40px 28px 32px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }
  .hero-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 5px;
    background: var(--grad); border-radius: var(--radius) var(--radius) 0 0;
  }
  .chapter-label {
    font-size: 12px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--text-muted);
    margin-bottom: 8px;
    font-family: var(--font-mono);
  }
  .chapter-name {
    font-size: 20px; font-weight: 700; color: var(--text);
    margin-bottom: 28px; line-height: 1.3;
  }

  /* Score ring */
  .score-ring-wrap { position: relative; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 20px; }
  .score-ring-svg { transform: rotate(-90deg); }
  .score-ring-bg { fill: none; stroke: rgba(155,126,222,0.15); }
  .score-ring-fill { fill: none; stroke-linecap: round; transition: stroke-dashoffset 1.4s cubic-bezier(.4,0,.2,1); }
  .score-inner {
    position: absolute; text-align: center;
    display: flex; flex-direction: column; align-items: center;
  }
  .score-pct {
    font-size: 52px; font-weight: 900; line-height: 1;
    background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; font-family: var(--font-mono);
  }
  .score-label { font-size: 12px; color: var(--text-muted); font-weight: 500; margin-top: 2px; }

  .grade-badge {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 24px; border-radius: 999px;
    background: var(--grad);
    color: #fff; font-size: 17px; font-weight: 700;
    box-shadow: 0 4px 18px rgba(139,92,246,0.38);
    margin-bottom: 8px;
  }
  .grade-emoji { font-size: 22px; }
  .score-fraction {
    font-size: 15px; color: var(--text-muted); font-family: var(--font-mono); font-weight: 600;
  }

  /* ── STATS GRID ── */
  .stats-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px;
    margin-bottom: 20px;
  }
  @media (min-width: 500px) { .stats-grid { grid-template-columns: repeat(4, 1fr); } }
  .stat-card {
    border-radius: var(--radius-sm);
    padding: 18px 14px; text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  .stat-card.green { background: var(--green-bg); border: 1.5px solid rgba(34,197,94,0.25); }
  .stat-card.red   { background: var(--red-bg);   border: 1.5px solid rgba(239,68,68,0.25); }
  .stat-card.amber { background: var(--amber-bg); border: 1.5px solid rgba(245,158,11,0.25); }
  .stat-card.blue  { background: rgba(129,140,248,0.1); border: 1.5px solid rgba(129,140,248,0.25); }
  .stat-icon { font-size: 24px; }
  .stat-val { font-size: 26px; font-weight: 800; font-family: var(--font-mono); line-height: 1; }
  .stat-card.green .stat-val { color: var(--green); }
  .stat-card.red   .stat-val { color: var(--red); }
  .stat-card.amber .stat-val { color: var(--amber); }
  .stat-card.blue  .stat-val { color: var(--accent3); }
  .stat-lbl { font-size: 11.5px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }

  /* ── ACTION BUTTONS ── */
  .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 28px; }
  .btn {
    flex: 1; min-width: 120px; cursor: pointer; border: none;
    padding: 13px 18px; border-radius: var(--radius-sm);
    font-size: 14px; font-weight: 600; transition: all 0.22s;
    font-family: inherit; display: inline-flex; align-items: center; justify-content: center; gap: 7px;
  }
  .btn-primary {
    background: var(--grad); color: #fff;
    box-shadow: 0 4px 16px rgba(139,92,246,0.35);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 22px rgba(139,92,246,0.5); }
  .btn-outline {
    background: rgba(255,255,255,0.7); color: var(--accent);
    border: 1.5px solid var(--glass-border); backdrop-filter: blur(8px);
  }
  .btn-outline:hover { background: rgba(255,255,255,0.9); transform: translateY(-2px); }

  /* ── REVIEW SECTION ── */
  .review-header {
    font-size: 18px; font-weight: 700; color: var(--text);
    margin-bottom: 16px; display: flex; align-items: center; gap: 10px;
  }
  .review-header span.pill {
    font-size: 12px; font-weight: 600; font-family: var(--font-mono);
    background: rgba(155,126,222,0.15); color: var(--accent);
    padding: 3px 10px; border-radius: 999px;
  }

  .q-card {
    margin-bottom: 16px; padding: 22px 22px 18px;
    border-radius: var(--radius);
  }
  .q-num {
    font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--text-muted);
    font-family: var(--font-mono); margin-bottom: 8px;
    display: flex; align-items: center; gap: 8px;
  }
  .q-status-badge {
    padding: 2px 9px; border-radius: 999px; font-size: 11px; font-weight: 700;
  }
  .q-status-badge.correct { background: var(--green-bg); color: var(--green); }
  .q-status-badge.wrong   { background: var(--red-bg);   color: var(--red); }
  .q-status-badge.skipped { background: var(--amber-bg); color: var(--amber); }

  .q-text { font-size: 15px; font-weight: 600; line-height: 1.55; margin-bottom: 14px; color: var(--text); }

  .opts-grid { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
  .opt {
    padding: 10px 14px; border-radius: var(--radius-sm); font-size: 13.5px; font-weight: 500;
    display: flex; align-items: flex-start; gap: 10px;
    background: rgba(255,255,255,0.45); border: 1.5px solid rgba(155,126,222,0.14);
    transition: background 0.18s;
  }
  .opt.correct { background: var(--green-bg); border-color: rgba(34,197,94,0.35); color: #166534; }
  .opt.wrong   { background: var(--red-bg);   border-color: rgba(239,68,68,0.35);  color: #991b1b; }
  .opt-letter {
    font-family: var(--font-mono); font-size: 12px; font-weight: 700;
    min-width: 22px; height: 22px; border-radius: 6px; display: flex; align-items: center; justify-content: center;
    background: rgba(155,126,222,0.15); color: var(--accent); flex-shrink: 0; margin-top: 1px;
  }
  .opt.correct .opt-letter { background: rgba(34,197,94,0.2);  color: #166534; }
  .opt.wrong   .opt-letter { background: rgba(239,68,68,0.2);   color: #991b1b; }
  .opt-icon { font-size: 14px; flex-shrink: 0; margin-top: 2px; }

  .exp-box {
    background: rgba(167,139,250,0.1); border: 1.5px solid rgba(167,139,250,0.25);
    border-radius: var(--radius-sm); padding: 12px 14px;
    font-size: 13px; line-height: 1.6; color: var(--text-muted);
    display: flex; gap: 9px;
  }
  .exp-icon { font-size: 15px; flex-shrink: 0; margin-top: 1px; }

  /* ── FOOTER META ── */
  .meta-row {
    display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 24px;
    font-size: 12px; font-family: var(--font-mono); color: var(--text-muted);
  }
  .meta-chip {
    background: rgba(255,255,255,0.6); border: 1.5px solid var(--glass-border);
    padding: 4px 12px; border-radius: 999px; backdrop-filter: blur(8px);
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center; padding: 52px 20px 44px; color: var(--text-muted);
  }
  .empty-state h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; color: var(--text); }
  .empty-state p  { font-size: 15px; line-height: 1.6; }
  .env-wrap {
    display: inline-flex; align-items: center; justify-content: center;
    width: 120px; height: 120px; border-radius: 36px; margin-bottom: 24px;
    background: rgba(255,255,255,0.6);
    border: 1.5px solid rgba(155,126,222,0.22);
    box-shadow: 0 8px 32px rgba(139,92,246,0.18);
    backdrop-filter: blur(14px);
    animation: envFloat 3.6s ease-in-out infinite;
    position: relative; overflow: visible;
  }
  .env-wrap::before {
    content: '';
    position: absolute; inset: -1px; border-radius: 37px;
    background: linear-gradient(120deg,#A78BFA,#C084FC,#818CF8);
    opacity: 0.14; z-index: 0; pointer-events: none;
  }
  .env-svg { position: relative; z-index: 1; }
  @keyframes envFloat {
    0%,100% { transform: translateY(0) rotate(-1.5deg); box-shadow: 0 8px 32px rgba(139,92,246,0.18); }
    50%      { transform: translateY(-12px) rotate(1.5deg); box-shadow: 0 20px 48px rgba(139,92,246,0.28); }
  }
  @keyframes flapWave {
    0%,100% { transform: rotateX(0deg); }
    35%     { transform: rotateX(-32deg); }
    65%     { transform: rotateX(-12deg); }
  }
  .env-flap { transform-origin: top center; animation: flapWave 3.6s ease-in-out infinite; perspective: 300px; }
  @keyframes twinkle {
    0%,100% { opacity: 0.18; transform: scale(0.75); }
    50%     { opacity: 1;    transform: scale(1.25); }
  }
  .env-star1 { animation: twinkle 2.2s ease-in-out infinite; }
  .env-star2 { animation: twinkle 2.2s ease-in-out infinite 0.75s; }
  .env-star3 { animation: twinkle 2.2s ease-in-out infinite 1.4s; }
  @keyframes letterBob {
    0%,100% { transform: translateY(0); }
    50%     { transform: translateY(-4px); }
  }
  .env-letter { animation: letterBob 3.6s ease-in-out infinite; }

  /* Divider */
  .divider { height: 1px; background: var(--glass-border); margin: 20px 0; }

  @media (max-width: 480px) {
    .score-pct { font-size: 40px; }
    .card { padding: 18px; }
    .hero-card { padding: 28px 18px 24px; }
  }

  /* Stagger reveal */
  .q-card { opacity: 0; transform: translateY(18px); transition: opacity 0.4s, transform 0.4s; }
  .q-card.visible { opacity: 1; transform: none; }
</style>
</head>
<body>
<div class="mesh-bg">
  <div class="mesh-dot"></div>
  <div class="mesh-dot"></div>
</div>

<div class="page">
  <!-- Lang Toggle -->
  <div class="lang-toggle-wrap">
    <div class="lang-pill">
      <button class="lang-btn active" id="btnEn" onclick="setLang('en')">English</button>
      <button class="lang-btn" id="btnHi" onclick="setLang('hi')">हिन्दी</button>
    </div>
  </div>

  <div id="root"></div>
</div>

<script>
// ── DATA ──
let DATA = null;
let LANG = 'en';

function setLang(l) {
  LANG = l;
  document.getElementById('btnEn').classList.toggle('active', l === 'en');
  document.getElementById('btnHi').classList.toggle('active', l === 'hi');
  document.body.classList.toggle('lang-hi', l === 'hi');
  render();
}

function t(en, hi) { return LANG === 'hi' ? hi : en; }

// ── GRADE ──
function getGrade(pct) {
  if (pct >= 90) return { label: t('Outstanding','शानदार'), emoji: '🏆', color: '#7C3AED' };
  if (pct >= 75) return { label: t('Excellent','उत्कृष्ट'),  emoji: '🎉', color: '#6D28D9' };
  if (pct >= 60) return { label: t('Good','अच्छा'),          emoji: '👍', color: '#2563EB' };
  if (pct >= 40) return { label: t('Average','औसत'),         emoji: '📚', color: '#D97706' };
  return             { label: t('Keep Trying','प्रयास जारी रखें'), emoji: '💪', color: '#DC2626' };
}

// ── TIME FORMAT ──
function fmtTime(sec) {
  if (!sec && sec !== 0) return '--';
  const m = Math.floor(sec / 60), s = sec % 60;
  return `${m}:${s.toString().padStart(2,'0')}`;
}

// ── REDIRECT URLS ──
function subjectUrl(d, type) {
  const s = (d.subject || '').toLowerCase();
  const isTheory = s.includes('theory') || s.includes('copa');
  const isEmp    = s.includes('employ');
  const home     = 'index.html';
  const theory   = 'copa.html';
  const emp      = 'employability.html';

  if (s.includes('full') || d.mode === 'full') return home;
  if (type === 'home')  return home;
  if (type === 'new')   return isEmp ? emp : isTheory ? theory : home;
  return 'quiz.html';
}

// ── ANIMATED COUNT-UP ──
let countUpAnim = null;
function startCountUp(target, duration, callback) {
  if (countUpAnim) cancelAnimationFrame(countUpAnim);
  const start = performance.now();
  function step(now) {
    const elapsed = Math.min((now - start) / duration, 1);
    const ease = 1 - Math.pow(1 - elapsed, 3);
    const val = Math.round(ease * target);
    callback(val);
    if (elapsed < 1) countUpAnim = requestAnimationFrame(step);
  }
  countUpAnim = requestAnimationFrame(step);
}

// ── RING ──
function ringHTML(pct) {
  const R = 70, C = 2 * Math.PI * R;
  const offset = C - (pct / 100) * C;
  // Gradient for stroke — we use a linearGradient trick
  return `
  <div class="score-ring-wrap">
    <svg class="score-ring-svg" width="170" height="170" viewBox="0 0 170 170">
      <defs>
        <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#A78BFA"/>
          <stop offset="50%" stop-color="#C084FC"/>
          <stop offset="100%" stop-color="#818CF8"/>
        </linearGradient>
      </defs>
      <circle class="score-ring-bg" cx="85" cy="85" r="${R}" stroke-width="12"/>
      <circle class="score-ring-fill" id="ringFill"
        cx="85" cy="85" r="${R}" stroke-width="12"
        stroke="url(#ringGrad)"
        stroke-dasharray="${C}"
        stroke-dashoffset="${C}"/>
    </svg>
    <div class="score-inner">
      <div class="score-pct" id="scorePct">0%</div>
      <div class="score-label">${t('Score','स्कोर')}</div>
    </div>
  </div>`;
}

// ── OPT LETTER ──
function optLetter(i) { return String.fromCharCode(65 + i); }

// ── QUESTION CARD HTML ──
function qCardHTML(q, idx) {
  const isSkip = q.chosen === -1 || q.chosen === undefined;
  const statusClass = isSkip ? 'skipped' : q.ok ? 'correct' : 'wrong';
  const statusLabel = isSkip
    ? t('Skipped','छोड़ा')
    : q.ok ? t('Correct','सही') : t('Wrong','गलत');

  const qText  = t(q.qEn  || '', q.qHi  || q.qEn  || '');
  const opts   = t(q.optsEn || [], q.optsHi || q.optsEn || []);
  const ansVal = t(q.ansEn || '', q.ansHi || q.ansEn || '');
  const expTxt = t(q.expEn || '', q.expHi || q.expEn || '');

  // Find correct index
  const optsEn = q.optsEn || [];
  const correctIdx = (LANG === 'hi') ? q.ansHi : q.ansEn;

  const optsHTML = opts.map((opt, i) => {
    let cls = '';
    if (i === correctIdx) cls = 'correct';
    else if (i === q.chosen && !q.ok) cls = 'wrong';
    const icon = i === correctIdx ? '✓' : (i === q.chosen && !q.ok ? '✗' : '');
    return `<div class="opt ${cls}">
      <span class="opt-letter">${optLetter(i)}</span>
      <span style="flex:1">${opt}</span>
      ${icon ? `<span class="opt-icon">${icon}</span>` : ''}
    </div>`;
  }).join('');

  const expBlock = expTxt ? `
    <div class="exp-box">
      <span class="exp-icon">💡</span>
      <span>${expTxt}</span>
    </div>` : '';

  return `
  <div class="q-card card" id="qcard-${idx}">
    <div class="q-num">
      Q${idx + 1}
      <span class="q-status-badge ${statusClass}">${statusLabel}</span>
    </div>
    <div class="q-text">${qText}</div>
    <div class="opts-grid">${optsHTML}</div>
    ${expBlock}
  </div>`;
}

// ── MAIN RENDER ──
function render() {
  const root = document.getElementById('root');

  if (!DATA) {
    root.innerHTML = `
    <div class="card empty-state">
      <div class="env-wrap">
        <svg class="env-svg" width="68" height="56" viewBox="0 0 68 56" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="envGrad" x1="0" y1="0" x2="68" y2="56" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#A78BFA"/>
              <stop offset="100%" stop-color="#818CF8"/>
            </linearGradient>
            <linearGradient id="flapGrad" x1="0" y1="0" x2="68" y2="28" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#C084FC"/>
              <stop offset="100%" stop-color="#A78BFA"/>
            </linearGradient>
          </defs>
          <!-- Envelope body -->
          <rect x="1" y="14" width="66" height="41" rx="7" fill="url(#envGrad)" opacity="0.18"/>
          <rect x="1" y="14" width="66" height="41" rx="7" fill="white" opacity="0.7"/>
          <rect x="1" y="14" width="66" height="41" rx="7" stroke="url(#envGrad)" stroke-width="1.8"/>
          <!-- Letter inside -->
          <g class="env-letter">
            <rect x="18" y="22" width="32" height="22" rx="3" fill="white" stroke="url(#envGrad)" stroke-width="1.2" opacity="0.9"/>
            <line x1="23" y1="29" x2="45" y2="29" stroke="#C084FC" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="23" y1="34" x2="45" y2="34" stroke="#A78BFA" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
            <line x1="23" y1="39" x2="36" y2="39" stroke="#818CF8" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
          </g>
          <!-- Envelope V-seam -->
          <polyline points="1,14 34,38 67,14" stroke="url(#envGrad)" stroke-width="1.5" fill="none" opacity="0.5"/>
          <!-- Flap (animated) -->
          <g class="env-flap">
            <path d="M1 14 L34 2 L67 14 Z" fill="url(#flapGrad)" opacity="0.85"/>
            <path d="M1 14 L34 2 L67 14" stroke="url(#envGrad)" stroke-width="1.5" fill="none"/>
          </g>
          <!-- Stars -->
          <circle class="env-star1" cx="8" cy="8" r="2.2" fill="#C084FC"/>
          <circle class="env-star2" cx="60" cy="5" r="1.6" fill="#818CF8"/>
          <circle class="env-star3" cx="56" cy="52" r="1.8" fill="#A78BFA"/>
        </svg>
      </div>
      <h2>${t('No Result Found','कोई परिणाम नहीं')}</h2>
      <p style="margin-top:6px">${t('Please complete a quiz first. Result data was not found in storage.','पहले कोई क्विज़ पूरा करें। परिणाम डेटा नहीं मिला।')}</p>
      <br/>
      <button class="btn btn-primary" style="margin:auto;max-width:200px" onclick="location.href='index.html'">
        🏠 ${t('Go Home','होम जाएं')}
      </button>
    </div>`;
    return;
  }

  const d = DATA;
  const correct  = d.score  || 0;
  const total    = d.total  || 0;
  const wrong    = (d.answered || 0) - correct;
  const skipped  = d.skipped || 0;
  const pct      = total > 0 ? Math.round((correct / total) * 100) : 0;
  const grade    = getGrade(pct);
  const chapter  = t(d.chapterEn || '', d.chapterHi || d.chapterEn || '');
  const review   = d.review || [];
  const timeUsed = fmtTime(d.timeUsed);
  const totalTime= fmtTime(d.totalTime);
  const C        = 2 * Math.PI * 70;
  const ringOffset = C - (pct / 100) * C;

  // Meta chips
  const metaChips = [
    d.subject  ? `<span class="meta-chip">📚 ${d.subject}</span>` : '',
    d.mode     ? `<span class="meta-chip">🎯 ${t('Mode','मोड')}: ${d.mode}</span>` : '',
    d.set      ? `<span class="meta-chip">📋 ${t('Set','सेट')}: ${d.set}</span>` : '',
    d.lang     ? `<span class="meta-chip">🌐 ${d.lang}</span>` : '',
    d.auto !== undefined ? `<span class="meta-chip">⏱ ${t('Auto-submit','ऑटो-सबमिट')}: ${d.auto ? t('Yes','हाँ') : t('No','नहीं')}</span>` : '',
  ].filter(Boolean).join('');

  // Retry: same config back to quiz.html
  const retryUrl  = `quiz.html?subject=${encodeURIComponent(d.subject||'')}&mode=${encodeURIComponent(d.mode||'')}&set=${encodeURIComponent(d.set||'')}&lang=${encodeURIComponent(d.lang||'')}`;
  const newSetUrl = subjectUrl(d, 'new');
  const homeUrl   = subjectUrl(d, 'home');

  // Review cards
  const reviewHTML = review.length === 0
    ? `<p style="color:var(--text-muted);font-size:14px">${t('No review data available.','कोई समीक्षा डेटा उपलब्ध नहीं।')}</p>`
    : review.map((q, i) => qCardHTML(q, i)).join('');

  root.innerHTML = `
  <!-- HERO -->
  <div class="card hero-card" style="margin-bottom:20px">
    <div class="chapter-label">${t('Result','परिणाम')}</div>
    <div class="chapter-name">${chapter || t('Quiz Complete','क्विज़ पूर्ण')}</div>
    ${ringHTML(pct)}
    <div style="height:16px"></div>
    <div class="grade-badge">
      <span class="grade-emoji">${grade.emoji}</span>
      <span>${grade.label}</span>
    </div>
    <div style="height:10px"></div>
    <div class="score-fraction">${correct} / ${total} ${t('correct','सही')}</div>
  </div>

  <!-- META -->
  ${metaChips ? `<div class="meta-row">${metaChips}</div>` : ''}

  <!-- STATS -->
  <div class="stats-grid" style="margin-bottom:20px">
    <div class="stat-card card green">
      <span class="stat-icon">✅</span>
      <span class="stat-val">${correct}</span>
      <span class="stat-lbl">${t('Correct','सही')}</span>
    </div>
    <div class="stat-card card red">
      <span class="stat-icon">❌</span>
      <span class="stat-val">${wrong < 0 ? 0 : wrong}</span>
      <span class="stat-lbl">${t('Wrong','गलत')}</span>
    </div>
    <div class="stat-card card amber">
      <span class="stat-icon">⏭</span>
      <span class="stat-val">${skipped}</span>
      <span class="stat-lbl">${t('Skipped','छोड़ा')}</span>
    </div>
    <div class="stat-card card blue">
      <span class="stat-icon">⏱</span>
      <span class="stat-val" style="font-size:18px">${timeUsed}</span>
      <span class="stat-lbl">${t('Time Used','समय')}</span>
    </div>
  </div>

  <!-- ACTIONS -->
  <div class="actions" style="margin-bottom:28px">
    <button class="btn btn-primary" onclick="location.href='${retryUrl}'">
      🔄 ${t('Retry','फिर से')}</button>
    <button class="btn btn-outline" onclick="location.href='${newSetUrl}'">
      📋 ${t('New Set','नया सेट')}</button>
    <button class="btn btn-outline" onclick="location.href='${homeUrl}'">
      🏠 ${t('Home','होम')}</button>
  </div>

  <!-- REVIEW -->
  <div class="review-header">
    ${t('Question Review','प्रश्न समीक्षा')}
    <span class="pill">${review.length} ${t('Qs','प्रश्न')}</span>
  </div>
  <div id="reviewList">${reviewHTML}</div>
  `;

  // Animate ring + count-up
  setTimeout(() => {
    const fill = document.getElementById('ringFill');
    const pctEl = document.getElementById('scorePct');
    if (fill) fill.style.strokeDashoffset = ringOffset;
    if (pctEl) startCountUp(pct, 1400, v => { pctEl.textContent = v + '%'; });

    // Stagger reveal q-cards
    review.forEach((_, i) => {
      setTimeout(() => {
        const el = document.getElementById(`qcard-${i}`);
        if (el) el.classList.add('visible');
      }, 80 + i * 60);
    });
  }, 80);
}

// ── LOAD DATA ──
(function init() {
  try {
    const raw = localStorage.getItem('copa_result');
    if (raw) DATA = JSON.parse(raw);
  } catch(e) { DATA = null; }

  // If lang saved in data, use it as default
  if (DATA && DATA.lang && (DATA.lang === 'hi' || DATA.lang === 'en')) {
    LANG = DATA.lang;
    document.getElementById('btnEn').classList.toggle('active', LANG === 'en');
    document.getElementById('btnHi').classList.toggle('active', LANG === 'hi');
    document.body.classList.toggle('lang-hi', LANG === 'hi');
  }

  render();
})();

// ── INTERSECTION OBSERVER for scroll-reveal ──
setTimeout(() => {
  const cards = document.querySelectorAll('.q-card');
  if ('IntersectionObserver' in window) {
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.1 });
    cards.forEach(c => obs.observe(c));
  } else {
    cards.forEach(c => c.classList.add('visible'));
  }
}, 500);
</script>
</body>
</html>
